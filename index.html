<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Student CV Builder | Professional Resume Maker Online</title>
<meta name="description" content="Create a professional student CV online for free. Fixed background layout, auto live update, perfect A4 PDF download and modern resume template.">
<meta name="keywords" content="student CV builder, resume maker, free resume creator, modern CV template, internship resume">
<meta name="author" content="Md Sadikur Rahman Shadhin">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://srkbro.github.io/">

<meta property="og:title" content="Free Student CV Builder">
<meta property="og:description" content="Build your professional resume online instantly and download in A4 PDF format.">
<meta property="og:type" content="website">

<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Free Student CV Builder",
  "applicationCategory": "BusinessApplication",
  "operatingSystem": "All",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD"
  }
}
</script>

</head>

<body>

<div class="container">

<div class="form">
<h2>Build Your CV</h2>
<input type="text" id="name" placeholder="Full Name">
<input type="text" id="title" placeholder="Career Title">
<input type="file" id="photo">
<textarea id="profile" placeholder="Profile Description"></textarea>
<input type="text" id="phone" placeholder="Phone Number">
<input type="email" id="email" placeholder="Email Address">
<input type="text" id="address" placeholder="Address">
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div class="cv" id="cv">

<div class="bg-top"></div>
<div class="bg-left"></div>
<div class="bg-right"></div>

<div class="content">

<div class="header">
<div class="photo-box">
<img id="cv-photo" src="default-profile.png">
</div>
<div>
<h1 id="cv-name">YOUR NAME</h1>
<h3 id="cv-title">Student</h3>
</div>
</div>

<div class="main">

<div class="left-section">
<h2>PROFILE</h2>
<p id="cv-profile"></p>

<h2>CONTACT ME</h2>
<p><i class="fa-solid fa-phone"></i> <span id="cv-phone"></span></p>
<p><i class="fa-solid fa-envelope"></i> <span id="cv-email"></span></p>
<p><i class="fa-solid fa-location-dot"></i> <span id="cv-address"></span></p>
</div>

<div class="right-section">
<h2><i class="fa-solid fa-arrow-right"></i> EDUCATION</h2>
<div id="cv-education"></div>

<h2><i class="fa-solid fa-arrow-right"></i> LANGUAGE</h2>
<div id="cv-language"></div>

<h2><i class="fa-solid fa-arrow-right"></i> COMPUTER SKILLS</h2>
<div id="cv-skills"></div>

<h2><i class="fa-solid fa-arrow-right"></i> WORK EXPERIENCE</h2>
<div id="cv-experience"></div>
</div>

</div>
</div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
