<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium CV Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="form">

<h2>Build Your CV</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="title" placeholder="Career Title">
<input type="file" id="photo">

<h3>Profile</h3>
<textarea id="profile" placeholder="Profile Description"></textarea>

<h3>Contact</h3>
<input type="text" id="phone" placeholder="Phone">
<input type="email" id="email" placeholder="Email">
<input type="text" id="address" placeholder="Address">

<h3>Education</h3>
<div id="education-section"></div>
<button onclick="addEducation()">+ Add Education</button>

<h3>Language</h3>
<div id="language-section"></div>
<button onclick="addLanguage()">+ Add Language</button>

<h3>Computer Skills</h3>
<div id="skill-section"></div>
<button onclick="addSkill()">+ Add Skill</button>

<h3>Work Experience</h3>
<div id="experience-section"></div>
<button onclick="addExperience()">+ Add Experience</button>

<button class="generate" onclick="generateCV()">Generate CV</button>

</div>



<div class="cv" id="cv">

<div class="header">
<div class="photo-box">
<img id="cv-photo" src="https://via.placeholder.com/180">
</div>
<div class="header-text">
<h1 id="cv-name">YOUR NAME</h1>
<h3 id="cv-title">Student</h3>
</div>
</div>

<div class="main">

<div class="left">

<h2>PROFILE</h2>
<p id="cv-profile"></p>

<h2>CONTACT ME</h2>
<p id="cv-phone"></p>
<p id="cv-email"></p>
<p id="cv-address"></p>

</div>

<div class="right">

<h2>EDUCATION</h2>
<div id="cv-education"></div>

<h2>LANGUAGE</h2>
<ul id="cv-language"></ul>

<h2>COMPUTER SKILLS</h2>
<ul id="cv-skills"></ul>

<h2>WORK EXPERIENCE</h2>
<div id="cv-experience"></div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
